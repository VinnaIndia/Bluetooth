name: Build Android App

on:
  push:
    branches:
      - development
      - master

jobs:
  build:
    runs-on: windows-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set Environment
      shell: pwsh
      run: |
        if ("${{ github.ref_name }}" -eq "development") {
          echo "FIREBASE_GROUP=testing-group" >> $env:GITHUB_ENV
          echo "APK_NAME=Bluetooth-Dev-${{ github.run_number }}.apk" >> $env:GITHUB_ENV
        }
        else {
          echo "FIREBASE_GROUP=production-group" >> $env:GITHUB_ENV
          echo "APK_NAME=Bluetooth-Prod-${{ github.run_number }}.apk" >> $env:GITHUB_ENV
        }

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Install MAUI
      run: |
        dotnet workload install maui
        dotnet workload install android

    # Decode Android Keystore
    - name: Decode Android Keystore
      shell: pwsh
      run: |
        [IO.File]::WriteAllBytes(
          "company-release.jks",
          [Convert]::FromBase64String("${{ secrets.ANDROID_KEYSTORE }}")
        )

    - name: Clean
      run: dotnet clean Bluetooth.csproj

    - name: Restore
      run: dotnet restore Bluetooth.csproj

    - name: Build Android
      run: dotnet build Bluetooth.csproj -f net9.0-android -c Release

    - name: Publish Signed APK
      shell: pwsh
      run: |
        dotnet publish Bluetooth.csproj `
          -f net9.0-android `
          -c Release `
          -p:ApplicationVersion=${{ github.run_number }} `
          -p:AndroidPackageFormat=apk `
          -p:AndroidKeyStore=true `
          -p:AndroidSigningKeyStore=company-release.jks `
          -p:AndroidSigningStorePass="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" `
          -p:AndroidSigningKeyAlias="${{ secrets.ANDROID_KEY_ALIAS }}" `
          -p:AndroidSigningKeyPass="${{ secrets.ANDROID_KEY_PASSWORD }}"

    - name: Rename APK
      shell: pwsh
      run: |
        $apk = Get-ChildItem -Recurse -Filter *.apk | Select-Object -First 1
        Copy-Item $apk.FullName $env:APK_NAME
        "APK_PATH=$env:APK_NAME" >> $env:GITHUB_ENV
        
    - name: Generate Release Notes 
      shell: pwsh 
      run: | 
        if ("${{ github.ref_name }}" -eq "development") {
          $environment = "Development"
        }
        else {
          $environment = "Production"
        }

        @"
        Environment: $environment
        APK: $env:APK_NAME
        Build Number: ${{ github.run_number }}
        Branch: ${{ github.ref_name }}

        Recent Changes:
        "@ | Out-File release-notes.txt
        git log -10 --pretty=format:"- %s" > release-notes.txt

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.APK_NAME }} 
        path: ${{ env.APK_NAME }}
       

    # Install Firebase CLI
    - name: Install Firebase CLI
      run: npm install -g firebase-tools

    # Create Firebase Service Account File
    - name: Create Firebase Credentials
      shell: pwsh
      run: |
        @'
        ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        '@ | Out-File firebase-service-account.json

    # Upload APK to Firebase App Distribution
    - name: Distribute APK to Firebase
      shell: pwsh
      env:
        GOOGLE_APPLICATION_CREDENTIALS: firebase-service-account.json
      run: |
        $apk = Get-ChildItem -Filter *.apk | Select-Object -First 1

        firebase appdistribution:distribute `
          $env:APK_PATH `
          --app "${{ secrets.FIREBASE_APP_ID }}" `
          --groups "$env:FIREBASE_GROUP" `
          --release-notes-file release-notes.txt
